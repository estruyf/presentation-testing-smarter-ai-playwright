title: Model Context Protocol (MCP)
description: ''
version: 2
demos:
  - id: demo-mikgjzq5-zgb4
    title: Create agents
    steps:
      - action: setTheme
        theme: Demo Time Light (no italic)
      - action: openTerminal
      - action: waitForTimeout
        timeout: 3000
      - action: executeTerminalCommand
        command: npx playwright init-agents --loop=vscode
        insertTypingSpeed: 10
        insertTypingMode: character-by-character
        terminalId: playwright
  - id: demo-mikgnty3-4jku
    title: Planner
    steps:
      - action: open
        path: .github/agents/playwright-test-planner.agent.md
  - id: demo-mikgo3bu-z090
    title: Generator
    steps:
      - action: open
        path: .github/agents/playwright-test-generator.agent.md
  - id: demo-mikgo2w0-h178
    title: Healer
    steps:
      - action: open
        path: .github/agents/playwright-test-healer.agent.md
  - title: Open Copilot Chat
    steps:
      - action: openCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.toggleMaximizedAuxiliaryBar
      - action: snippet
        contentPath: .demo/snippets/zoom.json
  - title: Create the plan
    steps:
      - action: customCopilotChat
        mode: playwright-test-planner
      - action: typeText
        content: Explore the `apps/website` app, and create a test plan for the basic inventory actions. Make sure to also include API tests and mock the APIs. Make sure to expect the unexpected like failing APIs.
        insertTypingSpeed: 5
      - action: pressEnter
  - title: Open the plan
    steps:
      - action: cancelCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.toggleMaximizedAuxiliaryBar
      - action: snippet
        contentPath: .demo/snippets/zoomReset.json
      - action: closeCopilotChat
      - action: open
        path: sticker-inventory-test-plan.md
  - title: Open Copilot Chat
    steps:
      - action: openCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.toggleMaximizedAuxiliaryBar
      - action: snippet
        contentPath: .demo/snippets/zoom.json
  - title: Generate the tests
    steps:
      - action: customCopilotChat
        mode: playwright-test-generator
      - action: typeText
        content: Generate me the `1. UI Components and Layout` tests for the sticker-inventory-test-plan.md test plan.
        insertTypingSpeed: 5
      - action: pressEnter
  - title: Show header navigation test
    steps:
      - action: cancelCopilotChat
      - action: executeVSCodeCommand
        command: workbench.action.toggleMaximizedAuxiliaryBar
      - action: snippet
        contentPath: .demo/snippets/zoomReset.json
      - action: closeCopilotChat
      - action: open
        path: tests/ui-components/header-navigation.spec.ts
  - title: Show hero section test
    steps:
      - action: open
        path: tests/ui-components/hero-section.spec.ts
  - title: Show inventory layout test
    steps:
      - action: open
        path: tests/ui-components/inventory-layout.spec.ts
  - id: scene-mmt6q301-1al2
    title: Run tests
    steps:
      - action: openTerminal
        terminalId: playwright
      - action: waitForTimeout
        timeout: 1000
      - action: executeTerminalCommand
        command: npx playwright test tests/ui-components/
        insertTypingMode: character-by-character
        terminalId: playwright
engageTime:
  sessionId: iotpoo
